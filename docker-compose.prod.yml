# Deploy de produção (acesso por IP, HTTP) — Hetzner / qualquer VPS Docker.
# Só o frontend (nginx) é exposto na porta 80; backend e banco ficam na rede interna.
# Uso: docker compose -f docker-compose.prod.yml --env-file .env up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gestrest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-gestrest}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gestrest}']
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-gestrest}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gestrest}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      # Acesso por IP em HTTP: cookie NÃO pode ser Secure, senão a sessão não persiste.
      COOKIE_SECURE: 'false'
      # Origem pública usada pelo Socket.IO / CORS (ex.: http://203.0.113.10)
      CORS_ORIGIN: ${PUBLIC_URL}
    expose:
      - '4000'

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - '80:80'

volumes:
  pgdata:
