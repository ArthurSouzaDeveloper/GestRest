server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers — apply to every response from this server (nginx inherits
  # add_header into child locations as long as they don't define their own).
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # Inert until served over HTTPS (browsers ignore HSTS on plain HTTP) — left in place so it
  # takes effect automatically once TLS is added, no extra step needed then.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  # 'unsafe-inline' on style-src covers React's inline style={} attributes and the Google
  # Fonts @import; ws:/wss: on connect-src covers the Socket.IO upgrade over this same origin.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' ws: wss:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API to backend service
  location /api/ {
    proxy_pass http://backend:4000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Proxy Socket.IO (WebSocket upgrade)
  location /socket.io/ {
    proxy_pass http://backend:4000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }
}
